name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Compile
        run: sbt compile

      - name: Test
        run: sbt test

      - name: Package
        run: sbt package

      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: "**/target/scala-*/aws-mock-*.jar"
